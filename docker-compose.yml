services:
  andrewtrade-api:
    image: registry.dizzyman.nl/andrewtrade:1.0.6
    build: .
    container_name: andrewtrade-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./state:/app/state

  andrewtrade-dash:
    image: registry.dizzyman.nl/andrewtrade:1.0.6
    pull_policy: never
    container_name: andrewtrade-dash
    restart: unless-stopped
    command: ["uvicorn", "papertrader.dashboard:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./state:/app/state
