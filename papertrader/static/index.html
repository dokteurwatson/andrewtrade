<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AndrewTrade Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>AndrewTrade Command Deck</h1>
        <p id="meta"></p>
        <p id="modeLabel" class="mode-badge"></p>
      </section>

      <section class="cards">
        <article class="card">
          <h2>Cash</h2>
          <p id="cash" class="big">$0.00</p>
          <p id="cooldown" class="small"></p>
        </article>
        <article class="card">
          <h2>Open Positions</h2>
          <p id="openPositions" class="big">0</p>
          <p id="entries" class="small"></p>
        </article>
        <article class="card">
          <h2>Trade Potential</h2>
          <p id="potentialScore" class="big">0%</p>
          <p id="potentialState" class="small"></p>
        </article>
      </section>

      <section class="panel">
        <h2>Ongoing Trades</h2>
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Qty</th>
              <th>Entry</th>
              <th>Stop</th>
            </tr>
          </thead>
          <tbody id="ongoingBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Completed Trades</h2>
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>PnL</th>
              <th>Price</th>
              <th>Reason</th>
            </tr>
          </thead>
          <tbody id="completedBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Dynamic Potential Radar</h2>
        <table>
          <thead>
            <tr>
              <th>Symbol</th>
              <th>Score</th>
              <th>State</th>
              <th>RSI</th>
              <th>Trend</th>
            </tr>
          </thead>
          <tbody id="potentialBody"></tbody>
        </table>
      </section>

      <section class="panel">
        <h2>Strategy Projection Chart</h2>
        <div class="chart-controls">
          <label for="chartSymbol">Symbol</label>
          <select id="chartSymbol"></select>
        </div>
        <div id="chart" class="chart-canvas"></div>
      </section>

      <section class="panel">
        <h2>Bot Configuration</h2>
        <div class="config-grid" id="configGrid"></div>
      </section>
    </main>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <script src="/static/app.js"></script>
  </body>
  </html>
