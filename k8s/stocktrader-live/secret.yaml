# Maak dit bestand NIET committed met echte waarden.
# Vul in via kubectl of gebruik een secrets manager (bijv. Sealed Secrets).
#
# kubectl create secret generic stocktrader-env \
#   --from-env-file=stocktrader/.env \
#   -n stocktrader --dry-run=client -o yaml | kubeseal > k8s/stocktrader/sealedsecret.yaml
#
# kubectl create secret generic ib-gateway-creds \
#   --from-literal=IB_USERNAME=jouw_ibkr_gebruikersnaam \
#   --from-literal=IB_PASSWORD=jouw_ibkr_wachtwoord \
#   -n stocktrader --dry-run=client -o yaml | kubeseal >> k8s/stocktrader/sealedsecret.yaml
#
---
apiVersion: v1
kind: Secret
metadata:
  name: stocktrader-env
  namespace: stocktrader-live
type: Opaque
stringData:
  PAPER_MODE: "false"
  PAPER_CAPITAL: "1000.0"
  DATA_SOURCE: "yfinance"
  POLYGON_API_KEY: ""
  IBKR_HOST: "ib-gateway"
  IBKR_PORT: "4002"
  IBKR_CLIENT_ID: "1"
  OTC_FILTER_ENABLED: "true"
  IBKR_MARKET_DATA_TYPE: "delayed"
  IBKR_BAR_STREAM: "historical"
  VOLUME_MULT: "2.0"
  ORB_MINUTES: "0"
  STOP_LOSS_FIELD: "hold"
  TARGET_FIELD: "t1"
  TELEGRAM_ENABLED: "true"
  TELEGRAM_BOT_TOKEN: "VERVANG_MIJ"
  TELEGRAM_CHAT_ID: "VERVANG_MIJ"
  DASHBOARD_PORT: "5001"
  STATE_DIR: "/data"
  LOG_LEVEL: "INFO"
  RISK_THRESHOLD_USD: "200"
  RISK_PER_TRADE_PCT: "0.02"
  MAX_POSITION_PCT: "0.25"
  MAX_POSITIONS: "3"
  CASH_RESERVE_PCT: "0.02"
---
apiVersion: v1
kind: Secret
metadata:
  name: ib-gateway-creds
  namespace: stocktrader-live
type: Opaque
stringData:
  IB_USERNAME: "VERVANG_MIJ"
  IB_PASSWORD: "VERVANG_MIJ"

